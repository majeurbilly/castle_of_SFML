name: Build Windows EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: 📥 Checkout du code
      uses: actions/checkout@v4

    - name: ⚙️ Setup .NET 6.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'

    - name: 🚀 Publish EXE (Windows x64)
      run: dotnet publish Raycaster/Raycaster.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./build_output

    - name: 📁 Copier les dossiers de ressources
      run: Copy-Item -Path "Raycaster/resources" -Destination "./build_output/resources" -Recurse -ErrorAction SilentlyContinue

    - name: 📦 Créer l'archive ZIP
      run: Compress-Archive -Path "./build_output/*" -DestinationPath "CastleOfSFML-Windows.zip"

    - name: 💌 Créer la Release GitHub
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: Latest Build
        body: "Build automatique du jeu - mis à jour à chaque push sur main. Dézippe et lance **Raycaster.exe** pour jouer."
        prerelease: true
        target_commitish: ${{ github.sha }}
        files: CastleOfSFML-Windows.zip
        overwrite_files: true
