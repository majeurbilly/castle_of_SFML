name: Build Castle of C++ (Visual Studio)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Visual Studio
      uses: microsoft/setup-msbuild@v1.1
    
    - name: Check environment
      run: |
        echo "Current directory: $PWD"
        echo "Directory contents:"
        dir
        echo "MSBuild location:"
        where msbuild
        echo "MSBuild version:"
        msbuild /version
    
    - name: Build Debug x64
      run: |
        msbuild "CastelOfC++/castle_of_SFML/castle_of_SFML.sln" /p:Configuration=Debug /p:Platform=x64 /p:PlatformToolset=v143 /v:minimal
    
    - name: Build Release x64
      run: |
        msbuild "CastelOfC++/castle_of_SFML/castle_of_SFML.sln" /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 /v:minimal
    
    - name: Create Debug package
      run: |
        mkdir -p build
        cd "CastelOfC++/castle_of_SFML/x64/Debug"
        7z a ../../../build/castle-debug-windows.zip *.exe *.dll
        cd ../../..
    
    - name: Create Release package
      run: |
        mkdir -p build
        cd "CastelOfC++/castle_of_SFML/x64/Release"
        7z a ../../../build/castle-release-windows.zip *.exe *.dll
        cd ../../..
    
    - name: Upload Debug artifacts
      uses: actions/upload-artifact@v4
      with:
        name: castle-debug-windows
        path: build/castle-debug-windows.zip
        retention-days: 30
    
    - name: Upload Release artifacts
      uses: actions/upload-artifact@v4
      with:
        name: castle-release-windows
        path: build/castle-release-windows.zip
        retention-days: 30
